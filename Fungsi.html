<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cocokkan Fungsi</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #e6f0ff, #fff5e6, #d4fcff, #ffe0c3);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  text-align: center;
  padding: 20px;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  font-size: 40px;
  background: linear-gradient(to right, #00bcd4, #4caf50);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #444;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 80px;
  margin-top: 30px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;

  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}

/* KOLOM */
.column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* KOTAK */
.box {
  width: 200px;
  height: 120px;

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);

  border-radius: 15px;
  cursor: pointer;
  font-weight: bold;

  transition: 0.3s;
  border: 2px solid transparent;
}

.box:hover {
  transform: translateY(-5px) scale(1.05);
}

/* PILIH */
.box.selected {
  border: 3px solid #4caf50;
  box-shadow: 0 0 15px rgba(76,175,80,0.5);
}

/* BENAR */
.box.correct {
  background: linear-gradient(to right, #4caf50, #66bb6a);
  color: white;
}

/* SALAH */
.box.wrong {
  background: linear-gradient(to right, #f44336, #e57373);
  color: white;
}

/* SKOR */
#score {
  margin-top: 20px;
  font-size: 1.5em;
  font-weight: bold;
}

/* BUTTON */
.buttons {
  margin-top: 25px;
}

button {
  padding: 12px 25px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;

  background: linear-gradient(to right, #2196f3, #4caf50);
  color: white;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>
<body>

<h1>⚙️ Cocokkan Fungsi Hardware</h1>
<p>Pilih hardware lalu pilih fungsi yang sesuai</p>

<div class="container">
  <div class="column" id="hardwareList"></div>
  <div class="column" id="functionList"></div>
</div>

<h2 id="score">Skor: 0</h2>

<div class="buttons">
  <button onclick="resetGame()">🔄 Main Lagi</button>
  <button onclick="goHome()">🏠 Kembali</button>
</div>

<script>
const data = [
  { name: "Keyboard", func: "Alat input teks" },
  { name: "Monitor", func: "Menampilkan output" },
  { name: "Mouse", func: "Alat penunjuk" }
];

let selected = null;
let score = 0;

const hardwareList = document.getElementById("hardwareList");
const functionList = document.getElementById("functionList");
const scoreText = document.getElementById("score");

/* ACAK */
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

/* LOAD GAME */
function loadGame() {
  hardwareList.innerHTML = "";
  functionList.innerHTML = "";
  selected = null;

  let hwShuffle = shuffle([...data]);
  let fnShuffle = shuffle([...data]);

  hwShuffle.forEach(item => {
    let div = document.createElement("div");
    div.className = "box";
    div.textContent = item.name;
    div.dataset.name = item.name;

    div.onclick = () => {
      document.querySelectorAll("#hardwareList .box")
        .forEach(b => b.classList.remove("selected"));
      div.classList.add("selected");
      selected = div;
    };

    hardwareList.appendChild(div);
  });

  fnShuffle.forEach(item => {
    let div = document.createElement("div");
    div.className = "box";
    div.textContent = item.func;

    div.onclick = () => {
      if (!selected) {
        alert("Pilih hardware dulu!");
        return;
      }

      const correct = data.find(d => d.name === selected.dataset.name).func;

      if (div.textContent === correct) {
        div.classList.add("correct");
        selected.style.opacity = "0.3";
        selected.style.pointerEvents = "none";

        score++;
        scoreText.textContent = "Skor: " + score;
      } else {
        div.classList.add("wrong");
        setTimeout(() => div.classList.remove("wrong"), 500);
      }

      selected.classList.remove("selected");
      selected = null;
    };

    functionList.appendChild(div);
  });
}

/* RESET */
function resetGame() {
  score = 0;
  scoreText.textContent = "Skor: 0";
  loadGame();
}

/* KEMBALI */
function goHome() {
  window.location.href = "index.html";
}

/* START */
loadGame();
</script>

</body>
</html>
