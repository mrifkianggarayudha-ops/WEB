<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hardware Game</title>

<style>

body{
  font-family:Segoe UI;
  text-align:center;
  background:#f4f7fb;
  padding:20px;
}

h1{
  color:#2196f3;
}

.container{
  display:flex;
  justify-content:center;
  gap:80px;
  margin-top:30px;
}

.column{
  display:flex;
  flex-direction:column;
  gap:20px;
}

img{
  width:120px;
  height:120px;
  object-fit:contain;
  background:white;
  padding:10px;
  border-radius:15px;
  cursor:pointer;
  border:2px solid transparent;
}

img.selected{
  border:3px solid #4caf50;
}

.name{
  width:150px;
  height:120px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}

.correct{
  background:#4caf50;
  color:white;
}

.wrong{
  background:#f44336;
  color:white;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:bold;
  margin:5px;
}

.play{
  background:#4caf50;
}

.back{
  background:#555;
}

.admin{
  background:#ff9800;
}

</style>
</head>

<body>

<h1>Mencocokkan Hardware</h1>

<p>Pilih gambar lalu pilih nama yang sesuai</p>

<div class="container">

  <div class="column" id="images"></div>

  <div class="column" id="names"></div>

</div>

<h2 id="score">Skor: 0</h2>

<div>

<button class="play" onclick="resetGame()">
Main Lagi
</button>

<button class="back" onclick="goHome()">
Kembali
</button>

<button class="admin" onclick="openAdmin()">
Admin
</button>

</div>

<script>

let data =
JSON.parse(localStorage.getItem("hardwareData")) || [

  {name:"Keyboard", img:"Keyboard.png"},
  {name:"Monitor", img:"Monitor.png"},
  {name:"Mouse", img:"Mouse.png"}

];

let selectedImage = null;
let score = 0;

const imgContainer =
document.getElementById("images");

const nameContainer =
document.getElementById("names");

const scoreText =
document.getElementById("score");

function shuffle(array){

  return array.sort(() =>
    Math.random() - 0.5
  );

}

function loadGame(){

  imgContainer.innerHTML = "";
  nameContainer.innerHTML = "";

  let shuffledImages =
  shuffle([...data]);

  let shuffledNames =
  shuffle([...data]);

  shuffledImages.forEach(item => {

    let img =
    document.createElement("img");

    img.src = item.img;

    img.dataset.name = item.name;

    img.onclick = () => {

      document.querySelectorAll("img")
      .forEach(i => {
        i.classList.remove("selected");
      });

      img.classList.add("selected");

      selectedImage = img;

    };

    imgContainer.appendChild(img);

  });

  shuffledNames.forEach(item => {

    let div =
    document.createElement("div");

    div.className = "name";

    div.textContent = item.name;

    div.onclick = () => {

      if(!selectedImage){

        alert("Pilih gambar dulu!");

        return;
      }

      if(selectedImage.dataset.name === div.textContent){

        div.classList.add("correct");

        selectedImage.style.opacity = "0.3";

        selectedImage.style.pointerEvents = "none";

        score++;

        scoreText.textContent =
        "Skor: " + score;

      } else {

        div.classList.add("wrong");

        setTimeout(() => {

          div.classList.remove("wrong");

        },500);

      }

      selectedImage.classList.remove("selected");

      selectedImage = null;

    };

    nameContainer.appendChild(div);

  });

}

function resetGame(){

  score = 0;

  scoreText.textContent = "Skor: 0";

  loadGame();

}

function goHome(){

  window.location.href = "index.html";

}

function openAdmin(){

  const password =
  prompt("Masukkan Password");

  if(password === "123"){

    window.location.href = "admin.html";

  } else {

    alert("Password salah!");

  }

}

loadGame();

</script>

</body>
</html>
