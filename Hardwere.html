<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cocokkan Hardware</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #e6f0ff, #fff5e6, #d4fcff, #ffe0c3);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  text-align: center;
  padding: 20px;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  font-size: 40px;
  background: linear-gradient(to right, #00bcd4, #4caf50);
  -webkit-background-clip: text;
  color: transparent;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 80px;
  margin-top: 30px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}

/* KOLOM */
.column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* GAMBAR */
img {
  width: 120px;
  height: 120px;
  object-fit: contain;
  background: rgba(255,255,255,0.7);
  padding: 10px;
  border-radius: 15px;
  cursor: pointer;
  border: 2px solid transparent;
}

img.selected {
  border: 3px solid #4caf50;
}

/* NAMA */
.name {
  width: 150px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.7);
  border-radius: 15px;
  cursor: pointer;
  font-weight: bold;
}

.name.correct {
  background: #4caf50;
  color: white;
}

.name.wrong {
  background: #f44336;
  color: white;
}

/* BUTTON */
.buttons {
  margin-top: 30px;
}

button {
  padding: 12px 25px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(to right, #2196f3, #4caf50);
  color: white;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>🖥️ Cocokkan Hardware</h1>
<p>Pilih gambar lalu pilih nama yang sesuai</p>

<div class="container">
  <div class="column" id="images"></div>
  <div class="column" id="names"></div>
</div>

<h2 id="score">Skor: 0</h2>

<div class="buttons">
  <button onclick="resetGame()">🔄 Main Lagi</button>
  <button onclick="goHome()">🏠 Kembali</button>
</div>

<script>
const data = [
  {name: "Keyboard", img: "Keyboard.png"},
  {name: "Monitor", img: "Monitor.png"},
  {name: "Mouse", img: "Mouse.png"}
];

let selectedImage = null;
let score = 0;

const imgContainer = document.getElementById("images");
const nameContainer = document.getElementById("names");
const scoreText = document.getElementById("score");

/* ACAK */
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

/* LOAD GAME */
function loadGame() {
  imgContainer.innerHTML = "";
  nameContainer.innerHTML = "";
  selectedImage = null;

  let shuffledImages = shuffle([...data]);
  let shuffledNames = shuffle([...data]);

  shuffledImages.forEach(item => {
    let img = document.createElement("img");
    img.src = item.img;
    img.dataset.name = item.name;

    img.onclick = () => {
      document.querySelectorAll("img").forEach(i => i.classList.remove("selected"));
      img.classList.add("selected");
      selectedImage = img;
    };

    imgContainer.appendChild(img);
  });

  shuffledNames.forEach(item => {
    let div = document.createElement("div");
    div.className = "name";
    div.textContent = item.name;

    div.onclick = () => {
      if (!selectedImage) {
        alert("Pilih gambar dulu!");
        return;
      }

      if (selectedImage.dataset.name === div.textContent) {
        div.classList.add("correct");
        selectedImage.style.opacity = "0.3";
        selectedImage.style.pointerEvents = "none";
        score++;
        scoreText.textContent = "Skor: " + score;
      } else {
        div.classList.add("wrong");
        setTimeout(() => div.classList.remove("wrong"), 500);
      }

      selectedImage.classList.remove("selected");
      selectedImage = null;
    };

    nameContainer.appendChild(div);
  });
}

/* RESET */
function resetGame() {
  score = 0;
  scoreText.textContent = "Skor: 0";
  loadGame();
}

/* KEMBALI */
function goHome() {
  window.location.href = "index.html";
}

/* START */
loadGame();
</script>

</body>
</html>
