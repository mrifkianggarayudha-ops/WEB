<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hardware</title>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f7fb;
  padding:30px;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
  color:#2196f3;
  margin-bottom:20px;
}

.top-button{
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

.add{
  background:#4caf50;
}

.edit{
  background:#2196f3;
}

.delete{
  background:#f44336;
}

.back{
  background:#555;
  margin-top:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
}

th{
  background:#2196f3;
  color:white;
}

img{
  width:70px;
  height:70px;
  object-fit:contain;
}

</style>
</head>

<body>

<div class="container">

<h1>Kelola Hardware</h1>

<div class="top-button">

<button class="add" onclick="goAdd()">
+ Tambah Hardware
</button>

</div>

<table>

<thead>

<tr>
<th>Gambar</th>
<th>Nama Hardware</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tableData"></tbody>

</table>

<button class="back" onclick="goBack()">
Kembali ke Game
</button>

</div>

<script>

let hardwareData =
JSON.parse(localStorage.getItem("hardwareData")) || [

  {
    name:"Keyboard",
    img:"Keyboard.png"
  },

  {
    name:"Monitor",
    img:"Monitor.png"
  },

  {
    name:"Mouse",
    img:"Mouse.png"
  }

];

function saveData(){

  localStorage.setItem(
    "hardwareData",
    JSON.stringify(hardwareData)
  );

}

function renderTable(){

  const table =
  document.getElementById("tableData");

  table.innerHTML = "";

  hardwareData.forEach((item,index)=>{

    table.innerHTML += `
    
    <tr>

      <td>
        <img src="${item.img}">
      </td>

      <td>
        ${item.name}
      </td>

      <td>

        <button
        class="edit"
        onclick="goEdit(${index})">

        Edit

        </button>

        <button
        class="delete"
        onclick="deleteData(${index})">

        Hapus

        </button>

      </td>

    </tr>

    `;

  });

}

function goAdd(){

  window.location.href =
  "add.html";

}

function goEdit(index){

  localStorage.setItem(
    "editIndex",
    index
  );

  window.location.href =
  "edit.html";

}

function deleteData(index){

  if(confirm("Hapus data ini?")){

    hardwareData.splice(index,1);

    saveData();

    renderTable();

  }

}

function goBack(){

  window.location.href =
  "Hardware.html";

}

renderTable();

</script>

</body>
</html>
