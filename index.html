<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechMatch</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="logo">🎮</div>

  <h1 class="title">TechMatch</h1>

  <p class="subtitle">
    Asah pengetahuan perangkat komputer
    dengan cara yang menyenangkan!
  </p>

  <div class="menu">

    <div class="card active" data-game="hardware">
      🖥️
      <span>Hardware</span>
    </div>

    <div class="card" data-game="fungsi">
      ⚙️
      <span>Fungsi</span>
    </div>

  </div>

  <div class="buttons">

    <button class="btn primary">
      Mulai Game
    </button>

    <button class="btn secondary">
      Petunjuk
    </button>

    <button class="btn admin" onclick="loginAdmin()">
      Admin
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
